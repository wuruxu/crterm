<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>Invalid Path</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      align-items: center;
      background: Canvas;
      color: CanvasText;
      display: flex;
      font-family: system-ui, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      max-width: 560px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 12px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 12px;
    }

    code {
      font-family: ui-monospace, monospace;
    }
  </style>
</head>
<body>
  <main>
    <p>This path is not supported by <code>crterm://local/filepath</code>.</p>
    <p>Use local path-style URL such as <code>crterm://local/tmp</code>.</p>
  </main>
</body>
</html>
