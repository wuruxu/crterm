<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="crTerm terminal icon">
  <defs>
    <linearGradient id="screenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f21"/>
      <stop offset="45%" stop-color="#070809"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="glassHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="56%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5a52"/>
      <stop offset="100%" stop-color="#ea3323"/>
    </linearGradient>

    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd84a"/>
      <stop offset="100%" stop-color="#fbbc04"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5bd66a"/>
      <stop offset="100%" stop-color="#34a853"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="promptGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.65"/>
    </filter>

    <clipPath id="screenClip">
      <rect x="78" y="78" width="356" height="356" rx="46" ry="46"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="none"/>

  <g filter="url(#softShadow)">
    <rect x="62" y="62" width="388" height="388" rx="60" ry="60" fill="#050505"/>
    <rect x="78" y="78" width="356" height="356" rx="46" ry="46" fill="url(#screenGradient)"/>

    <path d="M 122 62 H 390 Q 450 62 450 122" fill="none" stroke="url(#redGrad)" stroke-width="22" stroke-linecap="round"/>
    <path d="M 62 122 Q 62 62 122 62" fill="none" stroke="url(#redGrad)" stroke-width="22" stroke-linecap="round"/>
    <path d="M 62 122 V 390 Q 62 450 122 450 H 292" fill="none" stroke="url(#yellowGrad)" stroke-width="22" stroke-linecap="round"/>
    <path d="M 292 450 H 390 Q 450 450 450 390 V 122" fill="none" stroke="url(#greenGrad)" stroke-width="22" stroke-linecap="round"/>

    <rect x="78" y="78" width="356" height="356" rx="46" ry="46" fill="none" stroke="#2b2d30" stroke-width="3"/>

    <g clip-path="url(#screenClip)">
      <path d="M 82 78 H 390 L 242 244 H 82 Z" fill="url(#glassHighlight)"/>
    </g>
  </g>

  <g filter="url(#promptGlow)" fill="#f4f4f4">
    <path d="M 152 178 L 246 239 L 152 300 L 152 265 L 205 239 L 152 213 Z"/>
    <rect x="270" y="294" width="104" height="18" rx="2"/>
  </g>
</svg>
