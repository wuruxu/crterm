<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CrTerm Output</title>
  <style>
    body {
      font: 12px/1.4 monospace;
      margin: 0;
      min-width: 420px;
      max-width: 640px;
      background: #111;
      color: #f5f5f5;
    }

    header {
      padding: 10px 12px;
      border-bottom: 1px solid #2f2f2f;
      font-weight: 600;
    }

    #content {
      padding: 12px;
    }

    .session {
      margin-bottom: 16px;
    }

    .session-id {
      color: #8ec5ff;
      margin-bottom: 6px;
      word-break: break-all;
    }

    pre {
      margin: 0;
      padding: 10px;
      border-radius: 6px;
      background: #1b1b1b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <header>Recent CrTerm Output</header>
  <div id="content" class="empty">No terminal output received yet.</div>
  <script src="popup.js"></script>
</body>
</html>
